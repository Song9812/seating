<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>자리 배치 프로그램</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💺</text></svg>">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#f7f6f3;
    --surface:#ffffff;
    --surface2:#f0efe9;
    --border:#dddbd3;
    --border2:#c8c6bc;
    --text:#1a1917;
    --text2:#6b6a65;
    --text3:#a09e98;
    --accent:#2563eb;
    --accent-bg:#eff6ff;
    --danger:#dc2626;
    --radius:8px;
    --radius-lg:12px;
  }
  body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:24px 24px}
  h1{font-size:17px;font-weight:700;letter-spacing:-0.02em;margin-bottom:20px;color:var(--text)}
  .topbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:20px}
  .btn{font-size:13px;font-family:inherit;padding:7px 14px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--surface);color:var(--text);cursor:pointer;font-weight:500;transition:background .12s,border-color .12s}
  .btn:hover{background:var(--surface2)}
  .btn.active{background:var(--text);color:var(--surface);border-color:var(--text)}
  .btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
  .btn.primary:hover{background:#1d4ed8}
  .sep{width:1px;height:24px;background:var(--border);margin:0 2px}

  .layout{display:flex;gap:24px;align-items:flex-start}
  .board-area{flex:1;min-width:0}

  /* 칠판 */
  .blackboard{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);text-align:center;font-size:13px;color:var(--text3);padding:10px 0;margin-bottom:18px;letter-spacing:0.1em;font-weight:500}

  /* 분단 전체를 justify로 칠판 너비에 맞춤 */
  .groups-wrap{display:flex;justify-content:space-between;gap:0}

  .group{display:flex;flex-direction:column;align-items:center;gap:0}
  .group-label{font-size:11px;color:var(--text3);text-align:center;margin-bottom:5px;font-weight:500;letter-spacing:0.06em}
  .group-inner{border:2px solid var(--border2);border-radius:var(--radius-lg);padding:12px;display:flex;flex-direction:column;gap:10px;background:var(--surface2)}
  .row{display:flex;gap:10px}

  .seat{width:160px;height:80px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;user-select:none;transition:border-color .12s,background .12s}
  .seat.empty .sname{font-size:28px;color:var(--border2);line-height:1}
  .seat.occupied{border-color:var(--border2)}
  .seat.occupied:hover{border-color:var(--danger)}
  .seat.drag-over{border:2px dashed var(--accent);background:var(--accent-bg)}
  .seat .snum{position:absolute;top:6px;left:9px;font-size:12px;color:var(--text3)}
  .seat .sno{position:absolute;top:6px;right:9px;font-size:12px;color:var(--text3)}
  .seat .sname{font-size:18px;font-weight:500;text-align:center;padding:0 8px;word-break:keep-all;max-width:150px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;color:var(--text)}
  .seat .xbtn{position:absolute;bottom:6px;right:9px;font-size:14px;color:var(--text3);display:none;cursor:pointer;line-height:1}
  .seat.occupied:hover .xbtn{display:block;color:var(--danger)}
  .pair-gap{width:20px;flex-shrink:0}

  .stats{font-size:11px;color:var(--text3);margin-top:12px}

  /* 사이드바 */
  .sidebar{width:200px;flex-shrink:0}
  .sidebar-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px;margin-bottom:12px}
  .sidebar-section h3{font-size:13px;font-weight:700;color:var(--text2);margin-bottom:8px}
  .hint{font-size:11px;color:var(--text3);margin-bottom:6px;line-height:1.6}
  textarea{width:100%;font-size:12px;font-family:inherit;padding:7px 9px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--text);resize:vertical;min-height:100px;margin-bottom:6px;outline:none;transition:border-color .12s}
  textarea:focus{border-color:var(--accent)}
  .chip-list{display:flex;flex-direction:column;gap:3px;max-height:400px;overflow-y:auto}
  .chip{font-size:12px;padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--text);cursor:grab;user-select:none;display:flex;align-items:center;gap:7px;transition:background .1s}
  .chip:hover{background:var(--surface2)}
  .chip.placed{opacity:.35;cursor:default;pointer-events:none}
  .chip.sel{outline:2px solid var(--accent);outline-offset:-1px;background:var(--accent-bg)}
  .chip-no{font-size:11px;color:var(--text3);min-width:20px;flex-shrink:0}

  /* 배치표 */
  .output-section{margin-top:24px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px;display:none}
  .output-section.visible{display:block}
  .out-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .out-header h3{font-size:13px;font-weight:700;color:var(--text2);margin:0}
  .out-table-wrap{overflow-x:auto}
  .out-table{border-collapse:collapse;font-size:13px}
  .out-table td{border:1px solid var(--border2);padding:9px 14px;text-align:center;min-width:88px;color:var(--text);font-family:inherit;line-height:1.4}
  .out-table td.glbl{background:var(--surface2);color:var(--text2);font-weight:700;font-size:11px;letter-spacing:0.04em}
  .out-table td.board{background:var(--surface2);color:var(--text3);font-size:12px;letter-spacing:0.1em;font-weight:500}
  .out-table td.empty-cell{color:var(--border2)}
  .out-table td.spacer{border:none;background:transparent;padding:0;width:16px}
</style>
</head>
<body>
<h1>자리 배치 프로그램</h1>
<div class="topbar">
  <button class="btn active" id="btn57" onclick="setMode('5x7')">5×7 (짝 없음)</button>
  <button class="btn" id="btn66" onclick="setMode('6x6')">6×6 (짝 있음)</button>
  <div class="sep"></div>
  <button class="btn" onclick="randomize()">&#x21C4; 랜덤 배치</button>
  <button class="btn" onclick="clearAll()">&#x2715; 초기화</button>
  <button class="btn primary" onclick="toggleOutput()">&#x22A1; 배치표 보기</button>
</div>

<div class="layout">
  <div class="board-area">
    <div class="blackboard" id="blackboard">— 칠판 —</div>
    <div class="groups-wrap" id="groups"></div>
    <div class="stats" id="stats"></div>
  </div>
  <div class="sidebar">
    <div class="sidebar-section">
      <h3>학생 명단</h3>
      <div class="hint">번호와 이름을 한 줄에 하나씩<br>예) 1 김민준 또는 1. 김민준</div>
      <textarea id="nameInput" placeholder="1 김민준&#10;2 이서연&#10;3 박지호"></textarea>
      <button class="btn" style="width:100%;margin-bottom:0" onclick="loadNames()">명단 불러오기</button>
    </div>
    <div class="sidebar-section">
      <h3>배치할 학생</h3>
      <div class="hint">클릭 선택 후 자리 클릭<br>또는 드래그 앤 드롭</div>
      <div class="chip-list" id="chipList"></div>
    </div>
  </div>
</div>

<div class="output-section" id="outputSection">
  <div class="out-header">
    <h3>배치표</h3>
    <button class="btn" onclick="copyTable()">복사 (엑셀 붙여넣기용)</button>
    <span id="copyMsg" style="font-size:11px;color:var(--text3)"></span>
  </div>
  <div class="out-table-wrap" id="outTableWrap"></div>
</div>

<script>
let mode = '5x7';
let seats = [];
let students = [];
let selStudent = null;
let dragName = null;

function buildSeats() {
  seats = [];
  let id = 1;
  if (mode === '5x7') {
    for (let g = 0; g < 5; g++)
      for (let r = 0; r < 7; r++)
        seats.push({id:id++, group:g, row:r, col:0, name:null});
  } else {
    for (let g = 0; g < 3; g++)
      for (let r = 0; r < 6; r++)
        for (let c = 0; c < 2; c++)
          seats.push({id:id++, group:g, row:r, col:c, name:null});
  }
}

function renderBoard() {
  const wrap = document.getElementById('groups');
  wrap.innerHTML = '';
  const numGroups = mode === '5x7' ? 5 : 3;
  const numRows   = mode === '5x7' ? 7 : 6;
  const paired    = mode === '6x6';

  for (let gi = 0; gi < numGroups; gi++) {
    const gs  = seats.filter(s => s.group === gi);
    const div = document.createElement('div');
    div.className = 'group';

    const lbl = document.createElement('div');
    lbl.className = 'group-label';
    lbl.textContent = (gi+1) + '분단';
    div.appendChild(lbl);

    const inner = document.createElement('div');
    inner.className = 'group-inner';

    for (let r = 0; r < numRows; r++) {
      const rowEl   = document.createElement('div');
      rowEl.className = 'row';
      const rowSeats = gs.filter(s => s.row === r).sort((a,b) => a.col - b.col);
      rowSeats.forEach((seat, ci) => {
        if (paired && ci === 1) {
          const gap = document.createElement('div');
          gap.className = 'pair-gap';
          rowEl.appendChild(gap);
        }
        rowEl.appendChild(makeSeatEl(seat));
      });
      inner.appendChild(rowEl);
    }
    div.appendChild(inner);
    wrap.appendChild(div);
  }

  const filled = seats.filter(s => s.name).length;
  document.getElementById('stats').textContent = `배치된 학생: ${filled} / ${seats.length}자리`;
  if (document.getElementById('outputSection').classList.contains('visible')) buildOutputTable();
}

function makeSeatEl(seat) {
  const el = document.createElement('div');
  el.className = 'seat ' + (seat.name ? 'occupied' : 'empty');
  const st = students.find(s => s.name === seat.name);
  el.innerHTML = `<span class="snum">${seat.id}</span>`
    + (seat.name
      ? `${st ? `<span class="sno">${st.no}번</span>` : ''}<span class="sname">${seat.name}</span><span class="xbtn">✕</span>`
      : `<span class="sname">+</span>`);
  el.addEventListener('click', () => seatClick(seat.id));
  el.addEventListener('dragover',  e => { e.preventDefault(); el.classList.add('drag-over'); });
  el.addEventListener('dragleave', ()  => el.classList.remove('drag-over'));
  el.addEventListener('drop', e => { e.preventDefault(); el.classList.remove('drag-over'); dropOn(seat.id); });
  const xbtn = el.querySelector('.xbtn');
  if (xbtn) xbtn.addEventListener('click', e => { e.stopPropagation(); removeSeat(seat.id); });
  return el;
}

function seatClick(id) {
  const seat = seats.find(s => s.id === id);
  if (!seat || !selStudent) return;
  const prev = seats.find(s => s.name === selStudent);
  if (prev) prev.name = seat.name;
  seat.name = selStudent;
  selStudent = null;
  renderBoard(); renderChips();
}

function dropOn(id) {
  if (!dragName) return;
  const seat = seats.find(s => s.id === id);
  if (!seat) return;
  const prev = seats.find(s => s.name === dragName);
  if (prev) prev.name = seat.name;
  seat.name = dragName;
  dragName = null;
  renderBoard(); renderChips();
}

function removeSeat(id) {
  const seat = seats.find(s => s.id === id);
  if (seat) seat.name = null;
  renderBoard(); renderChips();
}

function renderChips() {
  const list = document.getElementById('chipList');
  list.innerHTML = '';
  if (!students.length) {
    list.innerHTML = '<div style="font-size:12px;color:var(--text3);padding:4px 0">명단을 먼저 불러오세요</div>';
    return;
  }
  students.forEach(st => {
    const placed = seats.some(s => s.name === st.name);
    const chip   = document.createElement('div');
    chip.className = 'chip' + (placed ? ' placed' : '') + (selStudent === st.name ? ' sel' : '');
    chip.innerHTML = `<span class="chip-no">${st.no}</span><span>${st.name}</span>`;
    chip.draggable = !placed;
    chip.addEventListener('click', () => {
      if (placed) return;
      selStudent = selStudent === st.name ? null : st.name;
      renderChips();
    });
    chip.addEventListener('dragstart', e => { if (placed) return; dragName = st.name; e.dataTransfer.effectAllowed = 'move'; });
    chip.addEventListener('dragend',   () => { dragName = null; });
    list.appendChild(chip);
  });
}

function loadNames() {
  const raw = document.getElementById('nameInput').value;
  const parsed = [];
  raw.split('\n').forEach(line => {
    const t = line.trim();
    if (!t) return;
    const m = t.match(/^(\d+)[.\s\-]+(.+)$/);
    if (m) parsed.push({no: parseInt(m[1]), name: m[2].trim()});
    else   parsed.push({no: parsed.length + 1, name: t});
  });
  students = parsed;
  renderChips();
}

function setMode(m) {
  mode = m;
  document.getElementById('btn57').className = 'btn' + (m === '5x7' ? ' active' : '');
  document.getElementById('btn66').className = 'btn' + (m === '6x6' ? ' active' : '');
  buildSeats(); renderBoard(); renderChips();
}

function randomize() {
  const unplaced = students.filter(st => !seats.some(s => s.name === st.name)).map(st => st.name);
  const empty    = seats.filter(s => !s.name).sort(() => Math.random() - .5);
  unplaced.sort(() => Math.random() - .5).forEach((n, i) => { if (empty[i]) empty[i].name = n; });
  renderBoard(); renderChips();
}

function clearAll() {
  seats.forEach(s => s.name = null);
  selStudent = null;
  renderBoard(); renderChips();
}

function toggleOutput() {
  const sec = document.getElementById('outputSection');
  sec.classList.toggle('visible');
  if (sec.classList.contains('visible')) buildOutputTable();
}

function buildOutputTable() {
  const wrap      = document.getElementById('outTableWrap');
  const paired    = mode === '6x6';
  const numGroups = mode === '5x7' ? 5 : 3;
  const numRows   = mode === '5x7' ? 7 : 6;
  const table     = document.createElement('table');
  table.className = 'out-table';

  const spacerTd = () => { const td = document.createElement('td'); td.className = 'spacer'; return td; };

  // 분단 헤더
  const headerRow = document.createElement('tr');
  for (let gi = 0; gi < numGroups; gi++) {
    if (gi > 0) headerRow.appendChild(spacerTd());
    const td = document.createElement('td');
    td.className = 'glbl';
    td.colSpan   = paired ? 3 : 1;
    td.textContent = (gi + 1) + '분단';
    headerRow.appendChild(td);
  }
  table.appendChild(headerRow);

  // 자리 행 (뒷줄부터 = 칠판에서 먼 쪽부터)
  for (let r = numRows - 1; r >= 0; r--) {
    const tr = document.createElement('tr');
    for (let gi = 0; gi < numGroups; gi++) {
      if (gi > 0) tr.appendChild(spacerTd());
      const rowSeats = seats.filter(s => s.group === gi && s.row === r).sort((a,b) => a.col - b.col);
      rowSeats.forEach((seat, ci) => {
        if (paired && ci === 1) tr.appendChild(spacerTd());
        const td = document.createElement('td');
        if (seat.name) {
          const st = students.find(s => s.name === seat.name);
          // 번호(줄바꿈)이름 형태
          td.textContent = st ? `${seat.name} ${st.no}` : seat.name;
        } else {
          td.className = 'empty-cell';
          td.textContent = '';
        }
        tr.appendChild(td);
      });
    }
    table.appendChild(tr);
  }

  // 칠판 행
  const boardRow = document.createElement('tr');
  const boardTd  = document.createElement('td');
  boardTd.className  = 'board';
  boardTd.colSpan    = 99;
  boardTd.textContent = '— 칠판 —';
  boardRow.appendChild(boardTd);
  table.appendChild(boardRow);

  wrap.innerHTML = '';
  wrap.appendChild(table);
}

function copyTable() {
  const table = document.querySelector('#outTableWrap .out-table');
  if (!table) return;
  let text = '';
  table.querySelectorAll('tr').forEach(tr => {
    const cells = [];
    tr.querySelectorAll('td').forEach(td => {
      if (td.classList.contains('spacer')) { cells.push(''); return; }
      cells.push(td.textContent.trim());
    });
    text += cells.join('\t') + '\n';
  });
  navigator.clipboard.writeText(text).then(() => {
    const msg = document.getElementById('copyMsg');
    msg.textContent = '복사됐어요! 엑셀에 붙여넣기 하세요.';
    setTimeout(() => msg.textContent = '', 2500);
  });
}

buildSeats();
renderBoard();
renderChips();
</script>
</body>
</html>
